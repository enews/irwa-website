<!DOCTYPE html>
<html lang="en-gb">
<head>
  {% include head.html %}
</head>
<body class="{{ page.body_class | default: 'page-template' }} lines">
  {% include header.html %}
  <div class="container lines lines--right">
    <main class="main {{ page.main_class | default: 'page' }}">
      {{ content }}
    </main>
    {% include footer.html %}
  </div>
  <script>
    window.publiiThemeMenuConfig = {
      mobileMenuMode: 'sidebar',
      animationSpeed: 300,
      submenuWidth: 'auto',
      doubleClickTime: 500,
      mobileMenuExpandableSubmenus: true,
      relatedContainerForOverlayMenuSelector: '.navbar',
    };
  </script>
  <script defer="defer" src="{{ "/assets/js/scripts.min.js" | relative_url }}"></script>
  <script>
    function publiiDetectLoadedImages () {
      var images = document.querySelectorAll('img[loading]:not(.is-loaded)');
      for (var i = 0; i < images.length; i++) {
        if (images[i].complete) {
          images[i].classList.add('is-loaded');
          images[i].parentNode.classList.remove('is-img-loading');
        } else {
          images[i].addEventListener('load', function () {
            this.classList.add('is-loaded');
            this.parentNode.classList.remove('is-img-loading');
          }, false);
        }
      }
    }
    publiiDetectLoadedImages();
  </script>
  <script src="{{ "/media/plugins/pagePrefetching/quicklink.umd.js" | relative_url }}"></script>
  <script>
    window.addEventListener('load', () => {
      quicklink.listen({
        prerender: false,
        el: document.querySelector('body'),
        delay: 0,
        limit: Infinity,
        throttle: Infinity,
        timeout: 2000
      });
    });
  </script>
  <script defer="defer" src="{{ "/media/plugins/syntaxHighlighter/prism.js" | relative_url }}"></script>
  <script defer="defer" src="{{ "/media/plugins/syntaxHighlighter/prism-line-numbers.min.js" | relative_url }}"></script>
  <script>
    (function() {
      var originalTitle = document.title;
      var timeout;
      document.addEventListener("visibilitychange", function() {
        if (document.hidden) {
          document.title = "👀 IRWA - Indie Roblox Wikis";
        } else {
          clearTimeout(timeout);
          document.title = "🎉 Nice to see you again!";
          setTimeout(function() {
            document.title = originalTitle;
          }, 1676);
        }
      });
    })();
  </script>
</body>
</html>
